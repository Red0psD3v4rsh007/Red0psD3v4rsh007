name: Generate Stats Cards

# Requires METRICS_TOKEN secret (GitHub PAT with repo scope).
# Add it at: Settings → Secrets → Actions → New repository secret
# Until then, this workflow will skip all steps.

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Red0psD3v4rsh007
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%

      - name: Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Red0psD3v4rsh007
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 90
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - name: Generate Achievements Card
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Red0psD3v4rsh007
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: B

      - name: Generate Habits Card
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Red0psD3v4rsh007
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "📊 Auto-update metrics" && git push
